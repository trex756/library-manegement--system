{% load static %}
<link rel="stylesheet" href="{% static 'style.css' %}">

<div class="dashboard">

    <!-- Header -->
    <div class="header">
        <h1>🛠 Admin Dashboard</h1>
        <a href="/logout/" onclick="return confirm('Logout?')">
            <button class="btn logout">Logout</button>
        </a>
    </div>

    <!-- Pending Requests -->
    <h2>📥 Pending Requests</h2>
    <div class="grid">
        {% for p in pending %}
        <div class="card">
            <p><strong>{{ p.user.username }}</strong></p>
            <p>📚 {{ p.book.title }}</p>

            <div class="actions">
                <a href="/approve/{{ p.id }}/">
                    <button class="btn approve">Approve</button>
                </a>
                <a href="/reject/{{ p.id }}/">
                    <button class="btn danger">Reject</button>
                </a>
            </div>
        </div>
        {% endfor %}
    </div>

    <!-- Approved -->
    <h2>✅ Approved Books</h2>
    <div class="grid">
        {% for a in approved %}
        <div class="card">
            <p><strong>{{ a.user.username }}</strong></p>
            <p>📖 {{ a.book.title }}</p>
            <span class="status approved">Approved</span>
        </div>
        {% endfor %}
    </div>

</div>
